<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Greeny - All Notifications</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../CSS/master.css" />
    <link rel="stylesheet" href="../CSS/notifications.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
    <nav>
    </nav>
    <main class="notifications-page">
        <div class="container">
            <div class="page-header">
                <h1 class="title">My Notifications</h1>
                <div class="header-actions">
                    <button class="btn-text">Mark all as read</button>
                </div>
            </div>

            <div class="notifications-list">
                <div class="full-notif-item unread">
                    <div class="notif-content">
                        <div class="notif-icon-large">👤</div>
                        <div class="notif-text-area">
                            <h3>New Comment!</h3>
                            <p>Someone Commented to your last blog " ................................... "</p>
                            <span class="time">10 mins ago</span>
                        </div>
                    </div>
                    <div class="notif-actions">
                        <button class="action-dot" title="Mark as Read"><i class="fa-solid fa-check"></i></button>
                        <button class="action-dot delete" title="Delete"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                </div>

                <div class="full-notif-item">
                    <div class="notif-content">
                        <div class="notif-icon-large">🛒</div>
                        <div class="notif-text-area">
                            <h3>New Order Placed</h3>
                            <p>We will make you up to dated with all new status.</p>
                            <span class="time">2 hours ago</span>
                        </div>
                    </div>
                    <div class="notif-actions">
                        <button class="action-dot delete" title="Delete"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                </div>

                <div class="full-notif-item">
                    <div class="notif-content">
                        <div class="notif-icon-large">✅</div>
                        <div class="notif-text-area">
                            <h3>Account Updated</h3>
                            <p>You have successfully changed your profile picture.</p>
                            <span class="time">Yesterday, 5:30 PM</span>
                        </div>
                    </div>
                    <div class="notif-actions">
                        <button class="action-dot delete" title="Delete"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </main>

</body>

</html>
